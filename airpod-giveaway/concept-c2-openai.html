<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UWC × EWPTE — Concept C2 (OpenAI)</title>
<link rel="stylesheet" href="shared.css">
<style>
  .page-c { background: #fff; }
  .c-headline-block {
    position: absolute;
    top: 1.4in;
    left: 0.6in;
    right: 0.6in;
    z-index: 3;
    text-align: center;
  }
  .c-kicker {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    font-size: 11pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 800;
    padding: 7pt 16pt 6pt;
    border-radius: 3pt;
    transform: rotate(-1.5deg);
    margin-bottom: 22pt;
    box-shadow: 0 6pt 18pt rgba(227,100,23,.25);
  }
  .c-headline {
    font-size: 88pt;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.04em;
    color: var(--navy);
  }
  .c-headline .punch {
    color: var(--orange);
    display: inline-block;
    transform: rotate(-2deg);
  }
  .c-image {
    position: absolute;
    bottom: 1.6in;
    left: 0.5in;
    right: 0.5in;
    height: 4.7in;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .c-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .c-disclaimer {
    position: absolute;
    bottom: 1.05in;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 3;
    font-size: 10pt;
    color: var(--text-lt);
    font-style: italic;
  }
  .c-disclaimer strong { color: var(--navy); font-weight: 700; font-style: normal; }
</style>
</head>
<body>
<div class="page page-c">

  <div class="brand-bar dark">
    <img class="logo" src="../assets/banners-22apr2026/unified-logo-redraw-with-black-text.png" alt="Unified Wire &amp; Cable">
    <span class="event-tag" style="color: var(--navy); opacity: 0.55;">EWPTE 2026 &middot; Booth Giveaway</span>
  </div>

  <div class="c-headline-block">
    <span class="c-kicker">For 2 days only</span>
    <div class="c-headline">Cut the&nbsp;<span class="punch">cord.</span></div>
  </div>

  <div class="c-image">
    <img src="images/concept-c-openai-cut-cord.png" alt="Orange wire cutters cutting a cable, AirPods popping out the other end">
  </div>

  <div class="c-disclaimer">Then please go back to <strong>buying our wire</strong>. We have a lot of it.</div>

  <div class="footer-bar">
    <div class="cta-block dark">
      <div class="cta-eyebrow">Scan Your Badge to Enter</div>
      <div class="cta-line-1">Win AirPods.</div>
      <div class="cta-line-2">Wednesday &amp; Thursday only &middot; drawing each day at 4 PM</div>
    </div>
    <div class="dates-stamp dark">
      <span class="lbl">Drawing</span>
      <span class="days">WED &amp; THU</span>
      <span class="show">EWPTE 2026 &middot; Milwaukee</span>
    </div>
  </div>

</div>
</body>
</html>
