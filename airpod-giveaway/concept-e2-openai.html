<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UWC × EWPTE — Concept E2 (OpenAI)</title>
<link rel="stylesheet" href="shared.css">
<style>
  .page-e { background: #fff; }
  .e-mini-mark {
    position: absolute;
    top: 0.55in;
    left: 0;
    right: 0;
    z-index: 3;
    text-align: center;
  }
  .e-mini-mark img {
    height: 0.32in;
    width: auto;
    opacity: 0.8;
  }
  .e-image {
    position: absolute;
    top: 1.4in;
    left: 0.5in;
    right: 0.5in;
    height: 5.4in;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .e-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .e-headline-block {
    position: absolute;
    top: 7.0in;
    left: 0.6in;
    right: 0.6in;
    text-align: center;
    z-index: 3;
  }
  .e-headline {
    font-size: 38pt;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--navy);
  }
  .e-headline .accent { color: var(--orange); }
  .e-deck {
    margin-top: 14pt;
    font-size: 14pt;
    color: var(--text-lt);
    font-weight: 400;
    line-height: 1.4;
    max-width: 5.5in;
    margin-left: auto;
    margin-right: auto;
  }
  .e-cta-bar {
    position: absolute;
    bottom: 0.65in;
    left: 0.6in;
    right: 0.6in;
    padding: 16pt 22pt;
    background: var(--navy);
    border-radius: 6pt;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #fff;
    z-index: 3;
  }
  .e-cta-bar .l-eyebrow {
    font-size: 9pt;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 3pt;
  }
  .e-cta-bar .l-line {
    font-size: 16pt;
    font-weight: 800;
    line-height: 1.05;
  }
  .e-cta-bar .r-line {
    font-size: 13pt;
    font-weight: 700;
    color: rgba(255,255,255,.92);
    letter-spacing: 0.05em;
  }
  .e-cta-bar .r-when {
    font-size: 8.5pt;
    color: rgba(255,255,255,.6);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2pt;
    text-align: right;
  }
</style>
</head>
<body>
<div class="page page-e">

  <div class="e-mini-mark">
    <img src="../assets/banners-22apr2026/unified-logo-redraw-with-black-text.png" alt="Unified Wire &amp; Cable">
  </div>

  <div class="e-image">
    <img src="images/concept-e-openai-minimalist.png" alt="Wireless earbuds floating on a clean white background">
  </div>

  <div class="e-headline-block">
    <div class="e-headline">The only <span class="accent">wire-free</span> booth at EWPTE.</div>
    <div class="e-deck">Scan your badge. We'll draw a winner Wednesday and Thursday. Yes, we still make wire. Lots of it. Come ask us about that too.</div>
  </div>

  <div class="e-cta-bar">
    <div>
      <div class="l-eyebrow">Scan Your Badge</div>
      <div class="l-line">Win AirPods.</div>
    </div>
    <div style="text-align:right;">
      <div class="r-line">Wed &amp; Thu</div>
      <div class="r-when">EWPTE 2026 &middot; Milwaukee</div>
    </div>
  </div>

</div>
</body>
</html>
