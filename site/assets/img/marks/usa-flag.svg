<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 116" preserveAspectRatio="xMidYMid meet">
  <g transform="translate(0 8)">
    <!-- white field -->
    <path d="M 0,0 Q 50,-12 100,0 Q 150,12 200,0 L 200,100 Q 150,112 100,100 Q 50,88 0,100 Z" fill="#fff"/>
    <!-- 7 red wavy stripes -->
    <g fill="#B22234">
      <path d="M 0,0 Q 50,-12 100,0 Q 150,12 200,0 L 200,7.692 Q 150,19.692 100,7.692 Q 50,-4.308 0,7.692 Z"/>
      <path d="M 0,15.385 Q 50,3.385 100,15.385 Q 150,27.385 200,15.385 L 200,23.077 Q 150,35.077 100,23.077 Q 50,11.077 0,23.077 Z"/>
      <path d="M 0,30.769 Q 50,18.769 100,30.769 Q 150,42.769 200,30.769 L 200,38.461 Q 150,50.461 100,38.461 Q 50,26.461 0,38.461 Z"/>
      <path d="M 0,46.154 Q 50,34.154 100,46.154 Q 150,58.154 200,46.154 L 200,53.846 Q 150,65.846 100,53.846 Q 50,41.846 0,53.846 Z"/>
      <path d="M 0,61.538 Q 50,49.538 100,61.538 Q 150,73.538 200,61.538 L 200,69.230 Q 150,81.230 100,69.230 Q 50,57.230 0,69.230 Z"/>
      <path d="M 0,76.923 Q 50,64.923 100,76.923 Q 150,88.923 200,76.923 L 200,84.615 Q 150,96.615 100,84.615 Q 50,72.615 0,84.615 Z"/>
      <path d="M 0,92.307 Q 50,80.307 100,92.307 Q 150,104.307 200,92.307 L 200,100 Q 150,112 100,100 Q 50,88 0,100 Z"/>
    </g>
    <!-- Canton: top edge follows wave, bottom edge follows wave at y=53.846 -->
    <path d="M 0,0 Q 38,-9.12 76,-4.56 L 76,49.286 Q 38,44.726 0,53.846 Z" fill="#3C3B6E"/>
    <!-- Stars (simplified pattern; small at display size) -->
    <defs>
      <path id="s" d="M0,-2.4 L0.71,-0.74 L2.28,-0.74 L1.04,0.28 L1.41,1.94 L0,0.94 L-1.41,1.94 L-1.04,0.28 L-2.28,-0.74 L-0.71,-0.74 Z" fill="#fff"/>
    </defs>
    <!-- Stars are positioned in canton with slight wave-following y-offsets; we simulate by shifting whole group up a touch since we know the canton sits in a region pulled upward -->
    <g>
      <use href="#s" x="6.33" y="3"/><use href="#s" x="19" y="2.3"/><use href="#s" x="31.67" y="1.7"/><use href="#s" x="44.33" y="1.2"/><use href="#s" x="57" y="0.9"/><use href="#s" x="69.67" y="0.8"/>
      <use href="#s" x="12.67" y="8"/><use href="#s" x="25.33" y="7.4"/><use href="#s" x="38" y="6.9"/><use href="#s" x="50.67" y="6.6"/><use href="#s" x="63.33" y="6.4"/>
      <use href="#s" x="6.33" y="13.5"/><use href="#s" x="19" y="12.9"/><use href="#s" x="31.67" y="12.4"/><use href="#s" x="44.33" y="12.1"/><use href="#s" x="57" y="11.9"/><use href="#s" x="69.67" y="11.8"/>
      <use href="#s" x="12.67" y="19"/><use href="#s" x="25.33" y="18.5"/><use href="#s" x="38" y="18.1"/><use href="#s" x="50.67" y="17.8"/><use href="#s" x="63.33" y="17.6"/>
      <use href="#s" x="6.33" y="24.5"/><use href="#s" x="19" y="24"/><use href="#s" x="31.67" y="23.6"/><use href="#s" x="44.33" y="23.4"/><use href="#s" x="57" y="23.2"/><use href="#s" x="69.67" y="23.1"/>
      <use href="#s" x="12.67" y="30"/><use href="#s" x="25.33" y="29.6"/><use href="#s" x="38" y="29.3"/><use href="#s" x="50.67" y="29.1"/><use href="#s" x="63.33" y="29"/>
      <use href="#s" x="6.33" y="35.5"/><use href="#s" x="19" y="35.2"/><use href="#s" x="31.67" y="34.9"/><use href="#s" x="44.33" y="34.7"/><use href="#s" x="57" y="34.6"/><use href="#s" x="69.67" y="34.5"/>
      <use href="#s" x="12.67" y="41"/><use href="#s" x="25.33" y="40.7"/><use href="#s" x="38" y="40.5"/><use href="#s" x="50.67" y="40.3"/><use href="#s" x="63.33" y="40.2"/>
      <use href="#s" x="6.33" y="46.5"/><use href="#s" x="19" y="46.3"/><use href="#s" x="31.67" y="46.1"/><use href="#s" x="44.33" y="46"/><use href="#s" x="57" y="45.9"/><use href="#s" x="69.67" y="45.8"/>
    </g>
  </g>
</svg>
