<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Unified Wire &amp; Cable — Spec Navigator</title>
  <link rel="icon" type="image/png" href="unifiedwire-favicon-apr2026.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #0362BC;
      --blue-dk: #024a90;
      --orange:  #E36417;
      --navy:    #0A1628;
      --navy2:   #0d1e38;
      --border:  #dce3ed;
      --font:    'Plus Jakarta Sans', -apple-system, sans-serif;
      --mono:    'DM Mono', monospace;
    }
    html, body {
      height: 100%; font-family: var(--font);
      background: var(--navy); color: #fff;
    }
    .gate {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 16px;
      background:
        radial-gradient(ellipse at 30% 60%, rgba(3,98,188,.22) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(227,100,23,.10) 0%, transparent 55%),
        var(--navy);
    }
    .gate-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }
    .gate-logo {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
    }
    .gate-logo img {
      height: 52px; width: auto;
      mix-blend-mode: screen;
    }
    .gate-eyebrow {
      font-family: var(--mono); font-size: .68rem; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(255,255,255,.4);
      text-align: center; margin-bottom: 8px;
    }
    .gate-heading {
      font-size: 1.25rem; font-weight: 800; text-align: center;
      color: #fff; margin-bottom: 6px; letter-spacing: -.02em;
    }
    .gate-sub {
      font-size: .85rem; color: rgba(255,255,255,.45);
      text-align: center; margin-bottom: 32px; line-height: 1.5;
    }
    .gate-field {
      position: relative; margin-bottom: 16px;
    }
    .gate-field label {
      display: block; font-size: .75rem; font-weight: 600;
      color: rgba(255,255,255,.5); margin-bottom: 6px;
      font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase;
    }
    .gate-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 8px; color: #fff;
      font-family: var(--font); font-size: .95rem;
      outline: none; transition: border-color .2s, background .2s;
    }
    .gate-input::placeholder { color: rgba(255,255,255,.25); }
    .gate-input:focus {
      border-color: var(--blue);
      background: rgba(3,98,188,.08);
    }
    .gate-input.error { border-color: #ef4444; animation: shake .35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .gate-error {
      font-size: .8rem; color: #f87171; margin-top: 8px;
      display: none; font-weight: 600;
    }
    .gate-error.visible { display: block; }
    .gate-btn {
      width: 100%; padding: 14px;
      background: var(--blue); border: none; border-radius: 8px;
      color: #fff; font-family: var(--font); font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .gate-btn:hover { background: var(--blue-dk); }
    .gate-btn:active { transform: scale(.98); }
    .gate-btn:disabled { opacity: .55; cursor: not-allowed; }
    .gate-spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .gate-btn.loading .gate-spinner { display: block; }
    .gate-btn.loading .gate-btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gate-footer {
      margin-top: 28px; text-align: center;
      font-size: .75rem; color: rgba(255,255,255,.2);
      font-family: var(--mono); letter-spacing: .04em;
    }
    .gate-divider {
      border: none; border-top: 1px solid rgba(255,255,255,.08);
      margin: 28px 0;
    }
  </style>
</head>
<body>
<div class="gate">
  <div class="gate-card">
    <div class="gate-logo">
      <img src="Unified-Logo-current.png" alt="Unified Wire & Cable">
    </div>
    <hr class="gate-divider">
    <div class="gate-eyebrow">Product Navigator</div>
    <div class="gate-heading">Authorized Access Only</div>
    <p class="gate-sub">Enter your access password to open the UWC Spec Sheet Navigator.</p>

    <form id="gateForm" onsubmit="return false;">
      <div class="gate-field">
        <label for="pwInput">Password</label>
        <input
          type="password" id="pwInput" class="gate-input"
          placeholder="Enter password" autocomplete="current-password"
          autofocus>
        <div class="gate-error" id="gateError">Incorrect password. Please try again.</div>
      </div>
      <button type="submit" class="gate-btn" id="gateBtn" onclick="unlock()">
        <span class="gate-spinner"></span>
        <span class="gate-btn-text">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:4px;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Unlock Navigator
        </span>
      </button>
    </form>

    <div class="gate-footer">Unified Wire &amp; Cable &nbsp;·&nbsp; Internal Use Only</div>
  </div>
</div>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function unlock() {
  const pw    = document.getElementById('pwInput').value;
  const input = document.getElementById('pwInput');
  const btn   = document.getElementById('gateBtn');
  const err   = document.getElementById('gateError');

  if (!pw) return;

  btn.disabled = true;
  btn.classList.add('loading');
  err.classList.remove('visible');
  input.classList.remove('error');

  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64ToBytes(PAYLOAD.salt), iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );

    const ciphertext = new Uint8Array([
      ...b64ToBytes(PAYLOAD.data),
      ...b64ToBytes(PAYLOAD.tag)
    ]);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: b64ToBytes(PAYLOAD.iv) },
      key,
      ciphertext
    );

    // Store session so refresh doesn't re-prompt
    sessionStorage.setItem('uwc_auth', pw);

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();

  } catch (e) {
    btn.disabled = false;
    btn.classList.remove('loading');
    input.classList.add('error');
    err.classList.add('visible');
    input.value = '';
    input.focus();
  }
}

// Auto-unlock if session already authenticated
(async () => {
  const saved = sessionStorage.getItem('uwc_auth');
  if (saved) {
    document.getElementById('pwInput').value = saved;
    await unlock();
  }
})();

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
